version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-blog-web
    ports:
      - "3001:3000"
    environment:
      # The values will be loaded from the .env.local file or your environment
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    env_file:
      - .env.local
    restart: unless-stopped
